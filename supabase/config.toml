# This is the main configuration file for your Supabase project.
# It's used by the Supabase CLI to manage your local development environment
# and to deploy your project to the Supabase platform.

[functions.sync-updated-bills]
# This is our main data pipeline, run daily by a cron job.
verify_jwt = false
import_map = "./functions/sync-updated-bills/deno.json"

[functions.verify-app-check]
# Retired (fail-closed 501 stub): no client code calls this, and the
# always-succeeds "INSECURE DEBUG MODE" bypass it used to run was an active
# vulnerability if anything were ever wired to trust it. verify_jwt=true now
# that it no longer needs custom in-code authorization.
verify_jwt = true
import_map = "./functions/verify-app-check/deno.json"

[functions.send-push-notifications]
# Authorized in code via isAuthorizedCronOrAdmin() (see votes-daily): an admin
# secret/service key (ops scripts) or the scheduler SYNC_SECRET validated against
# Vault (pg_cron). verify_jwt is disabled because (1) the cron sends a non-JWT
# publishable apikey the platform JWT check cannot verify, and (2) this function
# fans out to every bookmarker with the service-role key, so it must not be
# triggerable by any anon/JWT-authenticated user — only the cron/ops paths.
verify_jwt = false
import_map = "./functions/send-push-notifications/deno.json"

[functions.translate-bill]
# Called by the mobile client with the user's Supabase session JWT (never by
# pg_cron), so the platform's own JWT check is sufficient authorization --
# previously verify_jwt=false with NO in-code auth check at all, so anyone
# holding just the public anon key could trigger unlimited paid OpenAI
# translation calls. Anonymous sign-in sessions still carry a real JWT, so
# this does not block logged-out-but-anon-signed-in app users.
verify_jwt = true
import_map = "./functions/translate-bill/deno.json"

[functions.translate-bills]
# See functions.translate-bill: same fix, same reasoning.
verify_jwt = true
import_map = "./functions/translate-bills/deno.json"

[functions.find-your-rep]
# Called by the mobile client with the user's Supabase session JWT (never by
# pg_cron). Previously verify_jwt=false with NO in-code auth check, so anyone
# holding just the public anon key could trigger unlimited paid LocationIQ/
# OpenStates lookups.
verify_jwt = true
import_map = "./functions/find-your-rep/deno.json"

[functions."summarize-simple"]
verify_jwt = false

[functions."summarize-simple-backfill"]
# Retired (fail-closed 410 stub): ran with no in-code auth, looping the
# entire bills table with service-role writes triggerable by anyone. Nothing
# invokes it (confirmed by repo search). verify_jwt=true now that it no
# longer needs custom authorization.
verify_jwt = true

[functions.votes-backfill]
# Authorized in code via isAuthorizedCronOrAdmin(): an admin secret/service key
# (ops scripts) or the scheduler SYNC_SECRET validated against Vault (pg_cron).
# Required because the new (non-JWT) publishable apikey the cron sends cannot be
# verified by the platform's verify_jwt check.
verify_jwt = false

[functions.votes-daily]
# Authorized in code via isAuthorizedCronOrAdmin() (see votes-backfill).
verify_jwt = false

[functions.bulk-import-dataset]
# Authorized in code via isAuthorizedCronOrAdmin() (see votes-backfill).
verify_jwt = false
